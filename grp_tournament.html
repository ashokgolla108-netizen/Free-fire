<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashok Universe | Pro FF Engine</title>
<style>
    :root {
        --bg: #020617;
        --card-bg: rgba(15, 23, 42, 0.9);
        --ashok-glow: #8b5cf6;
        --accent: #10b981;
        --danger: #f43f5e;
        --warning: #f59e0b;
        --text-main: #f8fafc;
        --border: rgba(139, 92, 246, 0.3);
    }
    body {
        font-family: 'Inter', system-ui, sans-serif;
        background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
        background-attachment: fixed;
        color: var(--text-main);
        margin: 0; padding: 12px;
    }
    .container { max-width: 900px; margin: auto; }
    .screen { display: none; }
    .active { display: block; animation: universeFade 0.4s ease-out; }
    @keyframes universeFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .card { background: var(--card-bg); backdrop-filter: blur(15px); padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid var(--border); }
    .universe-title { font-size: 2.2rem; font-weight: 800; background: linear-gradient(to right, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin: 10px 0; }
    
    input, select, button, textarea { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(0,0,0,0.4); color: white; margin: 8px 0; font-size: 14px; }
    button { background: linear-gradient(135deg, #8b5cf6, #6d28d9); border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    
    .btn-red { background: linear-gradient(135deg, #ef4444, #991b1b); }
    .btn-green { background: linear-gradient(135deg, #10b981, #059669); }
    .btn-warn { background: linear-gradient(135deg, #f59e0b, #b45309); }
    .btn-outline { background: transparent; border: 1px solid var(--ashok-glow); color: var(--ashok-glow); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-group { display: grid; grid-template-columns: 2fr 1fr; gap: 8px; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { color: #94a3b8; font-size: 11px; text-transform: uppercase; padding: 10px 5px; border-bottom: 1px solid var(--border); }
    td { padding: 12px 5px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }

    .list-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin: 5px 0; border-left: 3px solid var(--ashok-glow); display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>

<div class="container">
    <div id="screen-login" class="screen active">
        <div class="card" style="text-align:center; margin-top:60px;">
            <div class="universe-title">ASHOK UNIVERSE</div>
            <p style="color:#94a3b8">Tournament Control Portal</p>
            <input id="login-user" placeholder="Commander ID">
            <input id="login-pass" type="password" placeholder="Access Key">
            <button onclick="handleLogin()">Authorize</button>
        </div>
    </div>

    <div id="screen-main" class="screen">
        <div class="card">
            <select id="tourney-selector" onchange="switchTourney(this.value)"></select>
            <div id="admin-setup" style="display:none; margin-top:10px;">
                <button onclick="createNewTourney()" class="btn-green" style="padding:8px; font-size:12px;">+ Create New Season</button>
            </div>
        </div>

        <div id="admin-tools" style="display:none">
            <div class="card">
                <h3 style="margin:0; color:var(--warning)">Management</h3>
                <div class="grid-2">
                    <button onclick="toggleSection('section-teams')" class="btn-outline">Teams</button>
                    <button onclick="toggleSection('section-fixtures')" class="btn-outline">Fixtures</button>
                </div>

                <div id="section-teams" style="display:none; margin-top:15px; border-top: 1px solid var(--border); padding-top:10px;">
                    <input id="team-name" placeholder="Team Name">
                    <textarea id="team-players" placeholder="Player1, Player2..." rows="2"></textarea>
                    <button id="team-save-btn" onclick="saveTeam()" class="btn-green">Add/Update Team</button>
                    <div id="teams-list-ui"></div>
                </div>

                <div id="section-fixtures" style="display:none; margin-top:15px; border-top: 1px solid var(--border); padding-top:10px;">
                    <input type="hidden" id="edit-fixture-id">
                    <div class="grid-2"><select id="fix-t1"></select><select id="fix-t2"></select></div>
                    <input id="fix-time" placeholder="Match Time (e.g. 9:00 PM)">
                    <button id="fixture-btn" onclick="saveFixture()" class="btn-warn">Schedule Match</button>
                    <div id="admin-fixtures-list"></div>
                </div>
            </div>

            <div class="card" id="scoring-area">
                <h3 style="margin:0; color:var(--ashok-glow)">Live Score Entry</h3>
                <div class="grid-2"><select id="match-t1"></select><select id="match-t2"></select></div>
                <div class="grid-2"><input id="score-t1" type="number" placeholder="T1 Points"><input id="score-t2" type="number" placeholder="T2 Points"></div>
                <div class="btn-group">
                    <button onclick="submitMatchResult()" class="btn-green">Record Result</button>
                    <button onclick="undoLast('matchHistory')" class="btn-red">Undo</button>
                </div>
                <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;">
                <select id="kill-p-select"></select>
                <input id="kill-val" type="number" placeholder="Kills Gained">
                <div class="btn-group">
                    <button onclick="addKillsToPlayer()" class="btn-warn">Add Kills</button>
                    <button onclick="undoLast('killHistory')" class="btn-red">Undo</button>
                </div>
            </div>
        </div>

        <div class="card"><h2>📅 Fixtures</h2><div id="public-fixtures-list"></div></div>
        <div class="card"><h2>🥇 Leaderboard</h2><table id="tbl-points"><thead><tr><th>Team</th><th>P</th><th>W</th><th>PTS</th></tr></thead><tbody></tbody></table></div>
        <div class="card"><h2>🔥 Team Kills</h2><table id="tbl-team-kills"><thead><tr><th>Team</th><th>Kills</th></tr></thead><tbody></tbody></table></div>
        <div class="card"><h2>🎯 Top Fraggers</h2><table id="tbl-kills"><thead><tr><th>Player</th><th>Kills</th></tr></thead><tbody></tbody></table></div>
        <div class="card"><h2>📜 Match History</h2><table id="tbl-history"><thead><tr><th>Match</th><th>Score</th><th>Winner</th></tr></thead><tbody></tbody></table></div>

        <button class="btn-red" onclick="location.reload()" style="margin-bottom:40px;">Logout</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, push, remove, get, serverTimestamp, update, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDlBDy4xQC1cP7c26Rmh7GC9yehfgqjZhw",
    authDomain: "grp-freefire-tournament.firebaseapp.com",
    databaseURL: "https://grp-freefire-tournament-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "grp-freefire-tournament"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let currentTid = "Season1", cache = { teams: {}, fixtures: {} }, isAdmin = false;

window.handleLogin = () => {
    const u = document.getElementById('login-user').value, p = document.getElementById('login-pass').value;
    if(u === "Ashok" && p === "7457") {
        isAdmin = true;
        document.querySelectorAll('#admin-tools, #admin-setup').forEach(el => el.style.display = 'block');
    }
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-main').style.display = 'block';
    loadTourneyList();
};

function loadTourneyList() {
    onValue(ref(db, 'tournaments'), (snap) => {
        const data = snap.val() || {};
        const sel = document.getElementById('tourney-selector');
        sel.innerHTML = "";
        Object.keys(data).forEach(id => sel.innerHTML += `<option value="${id}" ${id === currentTid ? 'selected' : ''}>${id}</option>`);
        syncData();
    });
}

window.switchTourney = (id) => { currentTid = id; syncData(); };

function syncData() {
    onValue(ref(db, `tournaments/${currentTid}`), (snap) => {
        const d = snap.val() || {};
        cache.teams = d.teams || {};
        cache.fixtures = d.fixtures || {};
        updateAdminDropdowns();
        renderTables(d);
    });
}

function updateAdminDropdowns() {
    if(!isAdmin) return;
    const tl = document.getElementById('teams-list-ui'), fl = document.getElementById('admin-fixtures-list');
    tl.innerHTML = ""; fl.innerHTML = "";
    Object.keys(cache.teams).forEach(n => tl.innerHTML += `<div class="list-item"><span>${n}</span><button onclick="editTeam('${n}')" class="btn-warn" style="width:auto; padding:4px;">Edit</button></div>`);
    Object.entries(cache.fixtures).forEach(([id, f]) => fl.innerHTML += `<div class="list-item"><span>${f.t1} vs ${f.t2}</span><button onclick="editFixture('${id}')" class="btn-warn" style="width:auto; padding:4px;">Edit</button></div>`);
    
    ['match-t1', 'match-t2', 'fix-t1', 'fix-t2'].forEach(id => {
        const el = document.getElementById(id); el.innerHTML = "";
        Object.keys(cache.teams).forEach(t => el.innerHTML += `<option value="${t}">${t}</option>`);
    });
    const pSel = document.getElementById('kill-p-select'); pSel.innerHTML = "";
    Object.entries(cache.teams).forEach(([t, pl]) => pl.forEach(p => pSel.innerHTML += `<option value="${p}">${p} (${t})</option>`));
}

window.saveTeam = () => {
    const n = document.getElementById('team-name').value.trim(), p = document.getElementById('team-players').value.split(',').map(x=>x.trim()).filter(x=>x);
    if(n && p.length) set(ref(db, `tournaments/${currentTid}/teams/${n}`), p);
};
window.editTeam = (n) => { document.getElementById('team-name').value = n; document.getElementById('team-players').value = cache.teams[n].join(', '); };

window.saveFixture = () => {
    const t1 = document.getElementById('fix-t1').value, t2 = document.getElementById('fix-t2').value, time = document.getElementById('fix-time').value, fid = document.getElementById('edit-fixture-id').value;
    if(fid) update(ref(db, `tournaments/${currentTid}/fixtures/${fid}`), {t1, t2, time});
    else push(ref(db, `tournaments/${currentTid}/fixtures`), {t1, t2, time});
};
window.editFixture = (fid) => {
    const f = cache.fixtures[fid]; document.getElementById('edit-fixture-id').value = fid;
    document.getElementById('fix-t1').value = f.t1; document.getElementById('fix-t2').value = f.t2; document.getElementById('fix-time').value = f.time;
};

window.submitMatchResult = () => {
    const t1 = document.getElementById('match-t1').value, t2 = document.getElementById('match-t2').value, r1 = parseInt(document.getElementById('score-t1').value), r2 = parseInt(document.getElementById('score-t2').value);
    if(!isNaN(r1)) push(ref(db, `tournaments/${currentTid}/matchHistory`), { t1, t2, r1, r2, winner: r1 > r2 ? t1 : t2 });
};

window.addKillsToPlayer = () => {
    const p = document.getElementById('kill-p-select').value, k = parseInt(document.getElementById('kill-val').value);
    if(!p || isNaN(k)) return;
    let tName = ""; Object.entries(cache.teams).forEach(([tn, pl]) => { if(pl.includes(p)) tName = tn; });
    push(ref(db, `tournaments/${currentTid}/killHistory`), { player: p, team: tName, count: k });
};

window.undoLast = async (path) => {
    const lastEntryQuery = query(ref(db, `tournaments/${currentTid}/${path}`), limitToLast(1));
    const snapshot = await get(lastEntryQuery);
    if (snapshot.exists()) {
        const key = Object.keys(snapshot.val())[0];
        if (confirm(`Delete last ${path} entry?`)) remove(ref(db, `tournaments/${currentTid}/${path}/${key}`));
    } else alert("No entries to undo.");
};

function renderTables(d) {
    const pts = {}, tk = {}, pk = {};
    Object.keys(cache.teams).forEach(t => { pts[t] = {p:0, w:0, pts:0}; tk[t] = 0; });
    const hist = Object.values(d.matchHistory || {}).reverse();
    hist.forEach(m => {
        const team1 = m.t1 || m.team1, team2 = m.t2 || m.team2;
        const win = m.winner || (m.r1 > m.r2 ? team1 : team2);
        if(pts[team1]) pts[team1].p++; if(pts[team2]) pts[team2].p++;
        if(pts[win]) { pts[win].w++; pts[win].pts += 2; }
    });
    Object.values(d.killHistory || {}).forEach(e => {
        pk[e.player] = (pk[e.player] || 0) + (parseInt(e.count) || 0);
        if(tk[e.team] !== undefined) tk[e.team] += (parseInt(e.count) || 0);
    });
    document.getElementById('public-fixtures-list').innerHTML = Object.values(cache.fixtures).map(f => `<div class="list-item"><span>${f.t1} vs ${f.t2}</span><span class="time-badge">${f.time}</span></div>`).join('');
    document.querySelector("#tbl-points tbody").innerHTML = Object.entries(pts).sort((a,b)=>b[1].pts-a[1].pts).map(([n,s])=>`<tr><td>${n}</td><td>${s.p}</td><td>${s.w}</td><td style="color:var(--accent)">${s.pts}</td></tr>`).join('');
    document.querySelector("#tbl-team-kills tbody").innerHTML = Object.entries(tk).sort((a,b)=>b[1]-a[1]).map(([n,k])=>`<tr><td>${n}</td><td>${k}</td></tr>`).join('');
    document.querySelector("#tbl-kills tbody").innerHTML = Object.entries(pk).sort((a,b)=>b[1]-a[1]).map(([p,k])=>`<tr><td>${p}</td><td>${k}</td></tr>`).join('');
    document.querySelector("#tbl-history tbody").innerHTML = hist.map(m=>`<tr><td>${m.t1} vs ${m.t2}</td><td>${m.r1}-${m.r2}</td><td>${m.winner}</td></tr>`).join('');
}

window.toggleSection = (id) => { const el = document.getElementById(id); el.style.display = el.style.display === 'none' ? 'block' : 'none'; };
window.createNewTourney = () => { const n = prompt("Season Name:"); if(n) set(ref(db, `tournaments/${n}/metadata`), {name:n}); };
</script>
</body>
</html>
